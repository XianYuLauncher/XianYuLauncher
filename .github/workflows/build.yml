name: Build and Release XianYuLauncher

on:
  push:
    # branches: [ "main" ] # 暂时屏蔽分支触发，仅通过 Tag 触发构建和发布，避免 Push 时重复运行
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

env:
  Velopack_Cli_Version: 0.0.1298
  Velopack_Runtime_Version: 9.0.x

jobs:
  guard-dispatch:
    name: Validate Dispatch Intent
    runs-on: ubuntu-latest
    outputs:
      publish_release: ${{ steps.intent.outputs.publish_release }}

    steps:
    - name: Validate manual mode
      id: intent
      shell: bash
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
          echo "publish_release=true" >> "$GITHUB_OUTPUT"
        else
          echo "publish_release=false" >> "$GITHUB_OUTPUT"
        fi

  validate:
    name: Validation Gate
    needs: guard-dispatch
    uses: ./.github/workflows/verify.yml
    with:
      upload_artifacts: false

  store-package:
    name: Store Packaged (${{ matrix.platform }})
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    strategy:
      matrix:
        platform: [x86, x64, arm64]
    
    runs-on: windows-latest

    env:
      Solution_Name: XianYuLauncher.slnx
      Project_Path: XianYuLauncher/XianYuLauncher.csproj
      Configuration: Release
      Platform: ${{ matrix.platform }}
      # 用于签名的临时文件名
      Certificate_Path: GitHubActionsWorkflow.pfx

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 配置 MSBuild
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    # 1.5. 安装 .NET 10 (WinUI3 需要)
    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # 2. Prepare Application Config
    - name: Prepare Application Config
      shell: powershell
      env:
        AES_ENCRYPTION_KEY: ${{ secrets.AES_ENCRYPTION_KEY }}
      run: |
        $secretJson = '${{ secrets.APP_SECRETS_JSON }}'
        if ([string]::IsNullOrWhiteSpace($secretJson)) {
            Write-Warning "Configuration data not set"
        }
        New-Item -ItemType Directory -Force -Path XianYuLauncher | Out-Null
        $secretJson | Out-File -FilePath XianYuLauncher/secrets.json -Encoding utf8
        Write-Host "Configuration prepared"
        
        .\scripts\prepare-config.ps1
        Write-Host "Configuration ready"

    # 2.1 生成爱发电赞助者静态清单（构建时注入，客户端不持有凭据）
    - name: Generate Afdian Sponsors Manifest
      shell: powershell
      env:
        AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
        AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
      run: |
        .\scripts\generate-afdian-sponsors.ps1 -OutputPath "XianYuLauncher/Assets/Data/afdian-sponsors.json"

    # 3. 准备证书 (Base64 -> PFX)
    - name: Prepare Certificate
      shell: powershell
      run: |
        $pfxBase64 = '${{ secrets.PFX_BASE64 }}'
        if ([string]::IsNullOrWhiteSpace($pfxBase64)) {
            Write-Error "Secret PFX_BASE64 missing"
            exit 1
        }
        $pfxPath = "$env:GITHUB_WORKSPACE\sign.pfx"
        $pfxBytes = [System.Convert]::FromBase64String($pfxBase64)
        [System.IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
        
        Write-Host "Cert saved to $pfxPath"
        
        # 显式导入证书并获取 Thumbprint
        $password = ConvertTo-SecureString -String '${{ secrets.PFX_PASSWORD }}' -AsPlainText -Force
        $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
        
        echo "PFX_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
        Write-Host "Imported certificate with Thumbprint: $($cert.Thumbprint)"

    # 4. 根据 Tag 判断通道并修改 Manifest (Dev/Stable)
    - name: Configure Channel
      id: store_channel
      shell: powershell
      run: |
        .\scripts\ci\configure-build-channel.ps1 `
          -RefName "${{ github.ref_name }}" `
          -UpdaterRuntimeIdentifier "win-${{ matrix.platform }}" `
          -UpdateManifest `
          -ManifestPath "XianYuLauncher/Package.appxmanifest"

    # 5. 还原包
    - name: Restore
      run: nuget restore ${{ env.Solution_Name }} -ConfigFile NuGet.config

    # 6. 构建并打包 (使用 MSBuild)
    - name: Build
      shell: powershell
      run: |
        msbuild ${{ env.Project_Path }} `
          /p:Configuration=${{ env.Configuration }} `
          /p:Platform=${{ env.Platform }} `
          /p:Version=${{ steps.store_channel.outputs.package_version }} `
          /p:AssemblyVersion=${{ steps.store_channel.outputs.package_version }} `
          /p:FileVersion=${{ steps.store_channel.outputs.package_version }} `
          /p:InformationalVersion=${{ steps.store_channel.outputs.display_version }} `
          /p:IncludeSourceRevisionInInformationalVersion=false `
          /p:DefineConstants="DISABLE_XAML_GENERATED_MAIN;${{ steps.store_channel.outputs.build_constants }}" `
          /p:GenerateAppxPackageOnBuild=true `
          /p:UapAppxPackageBuildMode=SideloadOnly `
          /p:AppxBundle=Never `
          /p:AppxPackageSigningEnabled=true `
          /p:PackageCertificateThumbprint="${{ env.PFX_THUMBPRINT }}" `
          /p:AppxPackageDir="$env:GITHUB_WORKSPACE\AppPackages\" `
          /p:PackageOutputPath="$env:GITHUB_WORKSPACE\AppPackages\" `
          /p:GenerateAppInstallerFile=false

    # 6.1 仅稳定版额外构建无签名 StoreUpload 包（用于提交微软商店）
    - name: Build StoreUpload (Unsigned)
      if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
      shell: powershell
      run: |
        msbuild ${{ env.Project_Path }} `
          /p:Configuration=${{ env.Configuration }} `
          /p:Platform=${{ env.Platform }} `
          /p:Version=${{ steps.store_channel.outputs.package_version }} `
          /p:AssemblyVersion=${{ steps.store_channel.outputs.package_version }} `
          /p:FileVersion=${{ steps.store_channel.outputs.package_version }} `
          /p:InformationalVersion=${{ steps.store_channel.outputs.display_version }} `
          /p:IncludeSourceRevisionInInformationalVersion=false `
          /p:DefineConstants="DISABLE_XAML_GENERATED_MAIN;${{ steps.store_channel.outputs.build_constants }}" `
          /p:GenerateAppxPackageOnBuild=true `
          /p:UapAppxPackageBuildMode=StoreUpload `
          /p:AppxBundle=Never `
          /p:AppxPackageSigningEnabled=false `
          /p:PackageCertificateThumbprint= `
          /p:PackageCertificateKeyFile= `
          /p:AppxPackageDir="$env:GITHUB_WORKSPACE\AppPackagesStore\" `
          /p:PackageOutputPath="$env:GITHUB_WORKSPACE\AppPackagesStore\" `
          /p:GenerateAppInstallerFile=false

    # === NEW: SignPath Integration Logic ===
    
    # 6.2. 查找生成的 MSIX 文件
    - name: Locate MSIX for Signing
      id: locate_msix
      shell: powershell
      run: |
        $sourceDir = "${{ github.workspace }}\AppPackages"
        # 找到生成的带 _Test 后缀的目录 (例如 XianYuLauncher_1.4.1.0_x64_Test)
        $testDir = Get-ChildItem -Path $sourceDir -Directory -Filter "*_Test" | Select-Object -First 1
        
        if (-not $testDir) {
            Write-Error "Could not find build output directory *_Test"
            exit 1
        }
        
        # 在里面找 .msix 文件
        $msixFile = Get-ChildItem -Path $testDir.FullName -Filter "*.msix" | Select-Object -First 1
        if (-not $msixFile) {
             # 如果没找到 msix, 可能是 appx
             $msixFile = Get-ChildItem -Path $testDir.FullName -Filter "*.appx" | Select-Object -First 1
        }
        
        if (-not $msixFile) {
            Write-Error "Could not find .msix or .appx file in $($testDir.FullName)"
            exit 1
        }

        Write-Host "Found artifact to sign: $($msixFile.FullName)"
        
        # 输出给后续步骤使用
        echo "MSIX_PATH=$($msixFile.FullName)" >> $env:GITHUB_ENV
        echo "MSIX_DIR=$($testDir.FullName)" >> $env:GITHUB_ENV

        # 准备输出目录
        $signedDir = "$env:GITHUB_WORKSPACE\SignedArtifacts"
        New-Item -ItemType Directory -Force -Path $signedDir | Out-Null
        echo "SIGNED_DIR=$signedDir" >> $env:GITHUB_ENV

    # 6.3. 提交给 SignPath 进行签名 (仅 Release 通道或非 Dev/Beta)
    # 暂时禁用 SignPath 签名，因为额度不足
    - name: Sign with SignPath
      if: false # ${{ !contains(github.ref, 'dev') && !contains(github.ref, 'beta') }}
      shell: pwsh
      env:
        SP_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        SP_ORG_ID: '50751291-6d7b-4d37-bba2-bcd3fa936266'
        SP_PROJECT_SLUG: 'xianyulauncher'
        SP_POLICY_SLUG: 'release-signing'
        ARTIFACT_PATH: ${{ env.MSIX_PATH }}
        DOWNLOAD_DIR: ${{ env.SIGNED_DIR }}
      run: |
        $apiUrl = "https://app.signpath.io/API/v1/$env:SP_ORG_ID"
        
        Write-Host "Submitting signing request for $($env:ARTIFACT_PATH)..."
        
        # 使用 PowerShell 7 (pwsh) 的 -Form 自动处理 multipart/form-data
        $form = @{
            projectSlug = $env:SP_PROJECT_SLUG
            signingPolicySlug = $env:SP_POLICY_SLUG
            artifact = Get-Item -Path $env:ARTIFACT_PATH
        }
        
        try {
            $response = Invoke-RestMethod -Uri "$apiUrl/SigningRequests/SubmitWithArtifact" `
                -Method Post `
                -Headers @{ Authorization = "Bearer $env:SP_API_TOKEN" } `
                -Form $form
        } catch {
            Write-Error "Submission failed: $_"
            if ($_.Exception.Response) {
                $reader = New-Object System.IO.StreamReader $_.Exception.Response.GetResponseStream()
                Write-Error $reader.ReadToEnd()
            }
            exit 1
        }
            
        $requestId = $response.signingRequestId
        Write-Host "Signing Request ID: $requestId"
        
        # 轮询等待签名完成
        $status = "InProgress"
        while ($status -in "InProgress", "QueuedForProcessing", "Processing", "RetrievingArtifact", "Submitted") {
            # 缩短轮询间隔
            Start-Sleep -Seconds 3
            try {
                $check = Invoke-RestMethod -Uri "$apiUrl/SigningRequests/$requestId" `
                    -Method Get `
                    -Headers @{ Authorization = "Bearer $env:SP_API_TOKEN" }
                $status = $check.status
                Write-Host "Current Status: $status"
            } catch {
                Write-Warning "Status check returned error, retrying..."
            }
        }
        
        if ($status -ne "Completed") {
            Write-Error "Signing failed with final status: $status"
            exit 1
        }
        
        # 下载签名后的文件
        $signedArtifactLink = $check.signedArtifactLink
        $fileName = Split-Path $env:ARTIFACT_PATH -Leaf
        $outputFile = Join-Path $env:DOWNLOAD_DIR $fileName
        
        Write-Host "Downloading signed artifact to $outputFile..."
        
        Invoke-RestMethod -Uri $signedArtifactLink `
            -Method Get `
            -Headers @{ Authorization = "Bearer $env:SP_API_TOKEN" } `
            -OutFile $outputFile
            
        Write-Host "Signed artifact downloaded successfully."

    # 6.4. 用签名后的文件替换掉本地文件 (仅当使用了 SignPath 时)
    # 暂时禁用 SignPath 签名，因为额度不足
    - name: Replace with Signed Artifact
      if: false # ${{ !contains(github.ref, 'dev') && !contains(github.ref, 'beta') }}
      shell: powershell
      run: |
        $originalMsix = "${{ env.MSIX_PATH }}"
        $signedMsixDir = "${{ env.SIGNED_DIR }}"
        
        # SignPath 下载回来的文件名可能不一样，但目录里应该只有一个文件
        $signedFile = Get-ChildItem -Path $signedMsixDir -File | Select-Object -First 1
        
        if (-not $signedFile) {
            Write-Error "No signed file found in $signedMsixDir"
            exit 1
        }
        
        Write-Host "Replacing $originalMsix with $($signedFile.FullName)"
        
        # 覆盖原始文件
        Copy-Item -Path $signedFile.FullName -Destination $originalMsix -Force

    # 7. 上传已签名 SideLoadOnly 包（仅供工作流留档，不参与 GitHub Release）
    - name: Upload Store Packaged Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: StorePackaged-${{ matrix.platform }}
        path: |
          ${{ github.workspace }}\AppPackages\**\*.msix
          ${{ github.workspace }}\AppPackages\**\*.appx
        if-no-files-found: error

    # 9. 上传无签名 StoreUpload 包（仅稳定版，且不参与 GitHub Release）
    - name: Upload Store Unsigned Artifacts
      if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
      uses: actions/upload-artifact@v4
      with:
        name: StoreUpload-${{ matrix.platform }}
        path: ${{ github.workspace }}\AppPackagesStore\*.msixupload
        if-no-files-found: error

  sideload-unpackaged:
    name: SideLoad Unpackaged (${{ matrix.platform }})
    needs: validate
    strategy:
      matrix:
        include:
          - platform: x86
            runtime_identifier: win-x86
          - platform: x64
            runtime_identifier: win-x64
          - platform: arm64
            runtime_identifier: win-arm64

    runs-on: windows-latest

    env:
      Solution_Name: XianYuLauncher.slnx
      Project_Path: XianYuLauncher/XianYuLauncher.csproj
      Platform: ${{ matrix.platform }}
      Runtime_Identifier: ${{ matrix.runtime_identifier }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install .NET 9 Runtime For Velopack CLI
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.Velopack_Runtime_Version }}

    - name: Install Velopack CLI
      shell: powershell
      run: |
        $toolPath = "$env:GITHUB_WORKSPACE\Tools\vpk"
        if (Test-Path $toolPath) {
            Remove-Item -Path $toolPath -Recurse -Force
        }

        dotnet tool install vpk --version ${{ env.Velopack_Cli_Version }} --tool-path $toolPath
        "VPK_EXE=$(Join-Path $toolPath 'vpk.exe')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Prepare Application Config
      shell: powershell
      env:
        AES_ENCRYPTION_KEY: ${{ secrets.AES_ENCRYPTION_KEY }}
      run: |
        $secretJson = '${{ secrets.APP_SECRETS_JSON }}'
        if ([string]::IsNullOrWhiteSpace($secretJson)) {
            Write-Warning "Configuration data not set"
        }
        New-Item -ItemType Directory -Force -Path XianYuLauncher | Out-Null
        $secretJson | Out-File -FilePath XianYuLauncher/secrets.json -Encoding utf8
        Write-Host "Configuration prepared"

        .\scripts\prepare-config.ps1
        Write-Host "Configuration ready"

    - name: Generate Afdian Sponsors Manifest
      shell: powershell
      env:
        AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
        AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
      run: |
        .\scripts\generate-afdian-sponsors.ps1 -OutputPath "XianYuLauncher/Assets/Data/afdian-sponsors.json"

    - name: Configure Channel
      id: sideload_channel
      shell: powershell
      run: |
        .\scripts\ci\configure-build-channel.ps1 `
          -RefName "${{ github.ref_name }}" `
          -UpdaterRuntimeIdentifier "${{ env.Runtime_Identifier }}"

    - name: Restore
      run: nuget restore ${{ env.Solution_Name }} -ConfigFile NuGet.config

    - name: Publish Unpackaged
      shell: powershell
      run: |
        $artifactBaseName = "XianYuLauncher-${{ steps.sideload_channel.outputs.display_version }}-${{ env.Runtime_Identifier }}"
        $publishRoot = "$env:GITHUB_WORKSPACE\PublishOutput\$artifactBaseName"
        $artifactRoot = "$env:GITHUB_WORKSPACE\Artifacts"
        $portableRoot = Join-Path $artifactRoot 'Portable'
        $releaseRoot = Join-Path $artifactRoot (Join-Path 'Velopack' $artifactBaseName)

        if (Test-Path $publishRoot) {
            Remove-Item -Path $publishRoot -Recurse -Force
        }

        if (Test-Path $releaseRoot) {
            Remove-Item -Path $releaseRoot -Recurse -Force
        }

        New-Item -ItemType Directory -Force -Path $publishRoot | Out-Null
        New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null
        New-Item -ItemType Directory -Force -Path $portableRoot | Out-Null
        New-Item -ItemType Directory -Force -Path $releaseRoot | Out-Null

        "SIDELOAD_ARTIFACT_BASENAME=$artifactBaseName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "SIDELOAD_PUBLISH_ROOT=$publishRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "SIDELOAD_RELEASE_ROOT=$releaseRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        msbuild ${{ env.Project_Path }} `
          -t:Publish `
          -restore `
          -p:PublishProfile=Release-Unpackaged `
          -p:Platform=${{ env.Platform }} `
          -p:RuntimeIdentifier=${{ env.Runtime_Identifier }} `
          -p:Version=${{ steps.sideload_channel.outputs.package_version }} `
          -p:AssemblyVersion=${{ steps.sideload_channel.outputs.package_version }} `
          -p:FileVersion=${{ steps.sideload_channel.outputs.package_version }} `
          -p:InformationalVersion=${{ steps.sideload_channel.outputs.display_version }} `
          -p:IncludeSourceRevisionInInformationalVersion=false `
          -p:DefineConstants="DISABLE_XAML_GENERATED_MAIN;${{ steps.sideload_channel.outputs.build_constants }}" `
          -p:PublishDir="$publishRoot\\" `
          -p:GenerateAppInstallerFile=false

        $zipPath = Join-Path $portableRoot "$artifactBaseName.zip"
        if (Test-Path $zipPath) {
            Remove-Item -Path $zipPath -Force
        }

        Compress-Archive -Path "$publishRoot\*" -DestinationPath $zipPath -Force

    - name: Seed Velopack History
      shell: powershell
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = 'application/vnd.github+json'
            'User-Agent' = 'github-actions'
            'X-GitHub-Api-Version' = '2022-11-28'
        }

        $repository = '${{ github.repository }}'
        $currentTag = '${{ github.ref_name }}'
        $channel = '${{ steps.sideload_channel.outputs.updater_channel }}'
        $releaseDirectory = $env:SIDELOAD_RELEASE_ROOT
        $releases = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$repository/releases?per_page=20"
        $downloadedAssets = [System.Collections.Generic.List[string]]::new()

        foreach ($release in $releases) {
            if ($release.tag_name -eq $currentTag) {
                continue
            }

            $matchingAssets = @($release.assets | Where-Object {
                $_.name -eq "releases.$channel.json" -or $_.name -like "*$channel*.nupkg"
            })

            if ($matchingAssets.Count -eq 0) {
                continue
            }

            foreach ($asset in $matchingAssets) {
                $targetPath = Join-Path $releaseDirectory $asset.name
                Invoke-WebRequest -Headers $headers -Uri $asset.browser_download_url -OutFile $targetPath
                $downloadedAssets.Add($asset.name)
            }

            break
        }

        if ($downloadedAssets.Count -eq 0) {
            Write-Host "No previous Velopack assets found for channel $channel. Delta generation will be skipped for this build."
        }
        else {
            Write-Host "Seeded Velopack history: $([string]::Join(', ', $downloadedAssets))"
        }

    - name: Pack Velopack Assets
      shell: powershell
      run: |
        .\scripts\ci\pack-velopack.ps1 `
          -PublishDirectory "$env:SIDELOAD_PUBLISH_ROOT" `
          -ReleaseDirectory "$env:SIDELOAD_RELEASE_ROOT" `
          -PackVersion "${{ steps.sideload_channel.outputs.updater_version }}" `
          -Channel "${{ steps.sideload_channel.outputs.updater_channel }}" `
          -RuntimeIdentifier "${{ env.Runtime_Identifier }}" `
          -VpkExecutablePath "$env:VPK_EXE"

    - name: Upload SideLoad Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SideLoadPackage-${{ steps.sideload_channel.outputs.channel }}-${{ matrix.platform }}
        path: ${{ github.workspace }}\Artifacts\**\*
        if-no-files-found: error

  release:
    needs:
      - guard-dispatch
      - store-package
      - sideload-unpackaged
    runs-on: ubuntu-latest
    if: ${{ always() && needs.guard-dispatch.outputs.publish_release == 'true' && needs.sideload-unpackaged.result == 'success' && (needs.store-package.result == 'success' || needs.store-package.result == 'skipped') }}
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: SideLoadPackage-*
        path: artifacts
        merge-multiple: true
        
    - name: Display structure of downloaded files
      run: ls -R artifacts

    # 1. 生成更新日志 (AI Powered)
    - name: Install Python Dependencies
      run: pip install requests

    - name: Generate AI Changelog
      id: build_changelog
      shell: bash
      run: |
        BASE_URL="${{ secrets.AI_API_BASE }}"
        if [ -z "$BASE_URL" ]; then BASE_URL="https://api.openai.com/v1"; fi
        
        MODEL="${{ secrets.AI_MODEL }}"
        if [ -z "$MODEL" ]; then MODEL="gpt-3.5-turbo"; fi
        
        echo "Generating changelog using model: $MODEL"
        
        python3 scripts/generate_changelog_ai.py \
          --base-url "$BASE_URL" \
          --model "$MODEL" \
          --current-ref "${{ github.ref_name }}" \
          --repo "${{ github.repository }}" \
          --github-token "${{ github.token }}" \
          --token "${{ secrets.AI_API_KEY }}" \
          --output "CHANGELOG.md"
          
        # 读取文件内容到 Output (使用随机分界符防止冲突，并确保有换行)
        DELIMITER="EOF-$(date +%s)"
        echo "changelog<<$DELIMITER" >> $GITHUB_OUTPUT
        cat CHANGELOG.md >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "$DELIMITER" >> $GITHUB_OUTPUT

    # 2. 发布 Release (只上传标准带版本号的文件，保持干净)
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        body: ${{ steps.build_changelog.outputs.changelog }}
        files: |
          artifacts/**/*.zip
          artifacts/**/*.json
          artifacts/**/*.nupkg
          artifacts/**/*Setup.exe
          artifacts/**/*Update.exe
        draft: false
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'dev') }}


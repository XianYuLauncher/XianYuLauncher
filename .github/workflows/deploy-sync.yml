name: Publish Release (Cloudflare R2 & Gitee)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to deploy (e.g. v1.4.2)'
        required: true
        default: 'v1.4.2'
      full_version:
        description: 'Full version (e.g. 1.4.2.0). Leave empty to auto-append .0'
        required: false
        default: ''

jobs:
  sync_to_r2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compute Version
        id: vars
        shell: bash
        run: |
          TAG_NAME="${{ inputs.tag_name }}"
          VER_NUM="${TAG_NAME#v}"
          FULL_VER_INPUT="${{ inputs.full_version }}"
          CHANNEL="stable"

          if [[ "$VER_NUM" == *"dev"* ]] || [[ "$VER_NUM" == *"beta"* ]] || [[ "$VER_NUM" == *"-"* ]]; then
            CHANNEL="dev"
          fi

          if [ -z "$FULL_VER_INPUT" ]; then
            FULL_VER="${VER_NUM}.0"
          else
            FULL_VER="$FULL_VER_INPUT"
          fi

          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "full_ver=$FULL_VER" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      - name: Fetch Release Notes
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh release view "${{ inputs.tag_name }}" --repo "${{ github.repository }}" --json body -q .body)
          PUBLISHED_AT=$(gh release view "${{ inputs.tag_name }}" --repo "${{ github.repository }}" --json publishedAt -q .publishedAt)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "published_at=$PUBLISHED_AT" >> $GITHUB_OUTPUT

      - name: Download Release Assets from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          TAG="${{ steps.vars.outputs.tag }}"

          echo "Downloading assets for $TAG..."
          gh release download "$TAG" --repo "${{ github.repository }}" --dir release-assets

          cd release-assets
          ls -lh

      - name: Upload Release Assets to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          RELEASE_CHANNEL: ${{ steps.vars.outputs.channel }}
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          echo "Starting upload to Cloudflare R2..."
          aws --version

          export R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          python3 << 'PYEOF'
          import os
          import re
          import subprocess

          release_dir = "release-assets"
          channel = os.environ["RELEASE_CHANNEL"]
          tag = os.environ["RELEASE_TAG"]
          bucket = os.environ["R2_BUCKET_NAME"]
          endpoint = os.environ["R2_ENDPOINT"]
          public_base = os.environ["R2_PUBLIC_BASE_URL"].rstrip("/")

          if not os.path.isdir(release_dir):
              raise SystemExit(f"Release assets directory not found: {release_dir}")

          uploaded_count = 0

          for file_name in sorted(os.listdir(release_dir)):
              file_path = os.path.join(release_dir, file_name)
              if not os.path.isfile(file_path):
                  continue

              arch_match = re.search(r"win-(x64|x86|arm64)", file_name, re.IGNORECASE)
              if arch_match:
                  architecture = f"win-{arch_match.group(1).lower()}"
              else:
                  zip_match = re.search(r"_(x64|x86|arm64)\.zip$", file_name, re.IGNORECASE)
                  if zip_match:
                      architecture = f"win-{zip_match.group(1).lower()}"
                  else:
                      print(f"Skipping asset without architecture marker: {file_name}")
                      continue

              object_key = f"{channel}/{tag}/{architecture}/{file_name}"
              destination = f"s3://{bucket}/{object_key}"

              print(f"Uploading {file_name} -> {destination}")
              subprocess.run(
                  [
                      "aws",
                      "s3",
                      "cp",
                      file_path,
                      destination,
                      "--endpoint-url",
                      endpoint,
                      "--only-show-errors",
                  ],
                  check=True,
              )

                  uploaded_count += 1

                if uploaded_count == 0:
              raise SystemExit("No architecture-specific release assets were uploaded to Cloudflare R2.")

                print(f"Uploaded {uploaded_count} assets to Cloudflare R2.")
          PYEOF

      - name: Build Release Asset Index
        run: |
          python3 scripts/ci/generate-update-manifest.py index \
            --release-assets-dir release-assets \
            --release-channel "${{ steps.vars.outputs.channel }}" \
            --release-tag "${{ steps.vars.outputs.tag }}" \
            --public-base-url "${{ secrets.R2_PUBLIC_BASE_URL }}" \
            --output-file release-asset-index.json

      - name: Build Update Manifest
        env:
          CHANGELOG: ${{ steps.release.outputs.body }}
        run: |
          printf '%s\n' "$CHANGELOG" > release-notes.txt

          python3 scripts/ci/generate-update-manifest.py manifest \
            --asset-index-file release-asset-index.json \
            --release-tag "${{ steps.vars.outputs.tag }}" \
            --release-version "${{ steps.vars.outputs.tag }}" \
            --published-at "${{ steps.release.outputs.published_at }}" \
            --notes-file release-notes.txt \
            --strict \
            --expected-architectures win-x64 win-x86 win-arm64 \
            --output-file update-manifest.json

      - name: Validate Update Manifest
        env:
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          python3 << 'PYEOF'
          import json
          import os

          with open("update-manifest.json", "r", encoding="utf-8") as handle:
              manifest = json.load(handle)

          expected_architectures = ("win-x64", "win-x86", "win-arm64")
          required_fields = (
              "channel",
              "setup_url",
              "setup_sha256",
              "feed_url",
              "package_url",
              "package_sha256",
              "package_size",
          )
          public_base = os.environ["R2_PUBLIC_BASE_URL"].rstrip("/")

          if manifest.get("schema_version") != 2 or manifest.get("delivery") != "velopack":
              raise SystemExit("Update manifest validation failed: unexpected top-level protocol markers.")

          for architecture in expected_architectures:
              target = manifest["targets"].get(architecture)
              if target is None:
                  raise SystemExit(f"Update manifest validation failed: missing target {architecture}.")

              for field in required_fields:
                  if not target.get(field):
                      raise SystemExit(f"Update manifest validation failed: target {architecture} missing {field}.")

              for url_field in ("setup_url", "feed_url", "package_url"):
                  if not target[url_field].startswith(public_base + "/"):
                      raise SystemExit(
                          f"Update manifest validation failed: target {architecture} field {url_field} does not use {public_base}."
                      )

          print("Update manifest validation passed.")
          PYEOF

      - name: Sync Gitee update_manifest.json
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          FULL_VER: ${{ steps.vars.outputs.full_ver }}
        run: |
          if [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_TOKEN is missing." >&2
            exit 1
          fi

          REPO="spiritos/XianYuLauncher-Resource"
          git clone "https://oauth2:${GITEE_TOKEN}@gitee.com/${REPO}.git" gitee-repo
          cd gitee-repo

          cp ../update-manifest.json ./update_manifest.json

          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add update_manifest.json
          git commit -m "chore: update update_manifest.json for $FULL_VER" || echo "No changes"
          git push

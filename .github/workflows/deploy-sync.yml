name: Publish Release (Cloudflare R2 & Gitee)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to deploy (e.g. v1.4.2)'
        required: true
        default: 'v1.4.2'
      full_version:
        description: 'Full version (e.g. 1.4.2.0). Leave empty to auto-append .0'
        required: false
        default: ''

jobs:
  sync_to_r2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compute Version
        id: vars
        shell: bash
        run: |
          TAG_NAME="${{ inputs.tag_name }}"
          VER_NUM="${TAG_NAME#v}"
          FULL_VER_INPUT="${{ inputs.full_version }}"
          CHANNEL="stable"

          if [[ "$VER_NUM" == *"dev"* ]] || [[ "$VER_NUM" == *"beta"* ]] || [[ "$VER_NUM" == *"-"* ]]; then
            CHANNEL="dev"
          fi

          if [ -z "$FULL_VER_INPUT" ]; then
            FULL_VER="${VER_NUM}.0"
          else
            FULL_VER="$FULL_VER_INPUT"
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "full_ver=$FULL_VER" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      - name: Fetch Release Notes
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh release view "${{ inputs.tag_name }}" --repo "${{ github.repository }}" --json body -q .body)
          PUBLISHED_AT=$(gh release view "${{ inputs.tag_name }}" --repo "${{ github.repository }}" --json publishedAt -q .publishedAt)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "published_at=$PUBLISHED_AT" >> $GITHUB_OUTPUT

      - name: Download Release Assets from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          TAG="${{ steps.vars.outputs.tag }}"
          
          echo "Downloading assets for $TAG..."
          gh release download "$TAG" --repo "${{ github.repository }}" --dir release-assets
          
          cd release-assets
          ls -lh

      - name: Upload Release Assets to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          RELEASE_CHANNEL: ${{ steps.vars.outputs.channel }}
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          echo "Starting upload to Cloudflare R2..."
          aws --version

          export R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          python3 << 'PYEOF'
          import json
          import os
          import re
          import subprocess

          release_dir = "release-assets"
          channel = os.environ["RELEASE_CHANNEL"]
          tag = os.environ["RELEASE_TAG"]
          bucket = os.environ["R2_BUCKET_NAME"]
          endpoint = os.environ["R2_ENDPOINT"]
          public_base = os.environ["R2_PUBLIC_BASE_URL"].rstrip("/")

          if not os.path.isdir(release_dir):
              raise SystemExit(f"Release assets directory not found: {release_dir}")

          uploaded = {}

          for file_name in sorted(os.listdir(release_dir)):
              file_path = os.path.join(release_dir, file_name)
              if not os.path.isfile(file_path):
                  continue

              arch_match = re.search(r"win-(x64|x86|arm64)", file_name, re.IGNORECASE)
              if arch_match:
                  architecture = f"win-{arch_match.group(1).lower()}"
              else:
                  zip_match = re.search(r"_(x64|x86|arm64)\.zip$", file_name, re.IGNORECASE)
                  if zip_match:
                      architecture = f"win-{zip_match.group(1).lower()}"
                  else:
                      print(f"Skipping asset without architecture marker: {file_name}")
                      continue

              object_key = f"{channel}/{tag}/{architecture}/{file_name}"
              destination = f"s3://{bucket}/{object_key}"

              print(f"Uploading {file_name} -> {destination}")
              subprocess.run(
                  [
                      "aws",
                      "s3",
                      "cp",
                      file_path,
                      destination,
                      "--endpoint-url",
                      endpoint,
                      "--only-show-errors",
                  ],
                  check=True,
              )

              uploaded[file_name] = f"{public_base}/{object_key}"

          if not uploaded:
              raise SystemExit("No architecture-specific release assets were uploaded to Cloudflare R2.")

          with open("r2_links.json", "w", encoding="utf-8") as handle:
              json.dump(uploaded, handle, ensure_ascii=False, indent=2)

          print(f"Uploaded {len(uploaded)} assets to Cloudflare R2.")
          PYEOF

      - name: Build Release Asset Index
        run: |
          python3 scripts/ci/generate-update-manifest.py index \
            --release-assets-dir release-assets \
            --release-channel "${{ steps.vars.outputs.channel }}" \
            --release-tag "${{ steps.vars.outputs.tag }}" \
            --public-base-url "${{ secrets.R2_PUBLIC_BASE_URL }}" \
            --output-file release-asset-index.json

      - name: Build Update Manifest Preview
        env:
          CHANGELOG: ${{ steps.release.outputs.body }}
        run: |
          printf '%s\n' "$CHANGELOG" > release-notes.txt

          python3 scripts/ci/generate-update-manifest.py manifest \
            --asset-index-file release-asset-index.json \
            --release-tag "${{ steps.vars.outputs.tag }}" \
            --release-version "${{ steps.vars.outputs.tag }}" \
            --published-at "${{ steps.release.outputs.published_at }}" \
            --notes-file release-notes.txt \
            --output-file update-manifest.preview.json

      - name: Sync Gitee latest_version.json
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          FULL_VER: ${{ steps.vars.outputs.full_ver }}
          TAG: ${{ steps.vars.outputs.tag }}
          CHANGELOG: ${{ steps.release.outputs.body }}
        run: |
          if [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_TOKEN is missing." >&2
            exit 1
          fi

          REPO="spiritos/XianYuLauncher-Resource"
          git clone "https://oauth2:${GITEE_TOKEN}@gitee.com/${REPO}.git" gitee-repo
          cd gitee-repo

          cp ../r2_links.json . 2>/dev/null || echo '{}' > r2_links.json

          python3 << 'PYEOF'
          import json, os
          from datetime import datetime

          path = "latest_version.json"
          links_path = "r2_links.json"
          
          # Read existing version file
          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)
              
          # Read Cloudflare R2 links
          links = {}
          if os.path.exists(links_path):
              with open(links_path, "r", encoding="utf-8") as f:
                  links = json.load(f)

          full_ver = os.environ.get("FULL_VER")
          tag = os.environ.get("TAG", "")
          changelog = os.environ.get("CHANGELOG", "")

          data["version"] = full_ver
          data["release_time"] = datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")

          if changelog:
              data["changelog"] = [line.strip() for line in changelog.split("\n") if line.strip()]
          
          # Helper to find link by arch
          def get_link(arch):
              candidates = [
                f"XianYuLauncher_{full_ver}_{arch}.zip",
                f"XianYuLauncher-{tag}-win-{arch}.zip",
              ]

              for candidate in candidates:
                if candidate in links:
                  return links[candidate]

              return ""

          mirrors = []
          
          r2_x64 = get_link("x64")
          if r2_x64:
              mirrors.append({
                  "name": "Cloudflare R2",
                  "url": r2_x64,
                  "arch_urls": {
                      "x64": r2_x64,
                      "x86": get_link("x86"),
                      "arm64": get_link("arm64")
                  }
              })
          
          data["download_mirrors"] = mirrors

          with open(path, "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          
          print(f"Updated latest_version.json with version={full_ver}")
          PYEOF

          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add latest_version.json
          git commit -m "chore: update version to $FULL_VER (Cloudflare R2)" || echo "No changes"
          git push

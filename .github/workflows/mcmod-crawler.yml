name: McMod Crawler (Manual to Gist)

run-name: >-
  McMod Crawler · ${{ inputs.mode }} · ${{ inputs.gist_filename }}${{ inputs.mode == 'append' && format(' · max {0}', inputs.max_items) || '' }}${{ inputs.mode == 'patch' && format(' · {0}-{1}', inputs.patch_start_id, inputs.patch_end_id) || '' }}${{ inputs.dry_run && ' · dry-run' || '' }}

on:
  workflow_dispatch:
    inputs:
      gist_filename:
        description: "Gist 中保存的文件名"
        required: true
        default: "mod_data.txt"
      mode:
        description: "运行模式：append=增量抓取，patch=区间修补，full-rebuild=全量重建"
        required: true
        type: choice
        default: "append"
        options:
          - append
          - patch
          - full-rebuild
      max_items:
        description: "仅 append 模式生效：本次最多抓取条数（0=不限制）"
        required: true
        default: "300"
      patch_start_id:
        description: "仅 patch 模式生效：起始 ID（包含，从 1 开始）"
        required: false
        default: "1"
      patch_end_id:
        description: "仅 patch 模式生效：结束 ID（包含）"
        required: false
        default: "100"
      dry_run:
        description: "仅运行抓取，不上传回 Gist"
        required: true
        type: boolean
        default: false

jobs:
  crawl-and-upload:
    runs-on: ubuntu-latest
    concurrency:
      group: mcmod-crawler-gist
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve config
        shell: bash
        run: |
          GIST_ID="${{ secrets.GIST_ID }}"
          MODE="${{ inputs.mode }}"

          if [ -z "$GIST_ID" ]; then
            echo "Missing required secret: GIST_ID" >&2
            exit 1
          fi

          case "$MODE" in
            append)
              if ! [[ "${{ inputs.max_items }}" =~ ^[0-9]+$ ]]; then
                echo "append 模式下 max_items 必须是 >= 0 的整数" >&2
                exit 1
              fi
              echo "CRAWLER_MODE=append" >> "$GITHUB_ENV"
              echo "CRAWLER_MAX_ITEMS=${{ inputs.max_items }}" >> "$GITHUB_ENV"
              ;;
            patch)
              if ! [[ "${{ inputs.patch_start_id }}" =~ ^[1-9][0-9]*$ ]]; then
                echo "patch 模式下 patch_start_id 必须是 >= 1 的整数" >&2
                exit 1
              fi
              if ! [[ "${{ inputs.patch_end_id }}" =~ ^[1-9][0-9]*$ ]]; then
                echo "patch 模式下 patch_end_id 必须是 >= 1 的整数" >&2
                exit 1
              fi

              PATCH_START=${{ inputs.patch_start_id }}
              PATCH_END=${{ inputs.patch_end_id }}

              if [ "$PATCH_END" -lt "$PATCH_START" ]; then
                echo "patch_end_id 必须 >= patch_start_id" >&2
                exit 1
              fi

              PATCH_COUNT=$((PATCH_END - PATCH_START + 1))

              echo "CRAWLER_MODE=patch" >> "$GITHUB_ENV"
              echo "CRAWLER_PATCH_START=$PATCH_START" >> "$GITHUB_ENV"
              echo "CRAWLER_PATCH_COUNT=$PATCH_COUNT" >> "$GITHUB_ENV"
              ;;
            full-rebuild)
              echo "CRAWLER_MODE=full-rebuild" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported mode: $MODE" >&2
              exit 1
              ;;
          esac

          echo "GIST_ID=$GIST_ID" >> "$GITHUB_ENV"
          echo "GIST_FILENAME=${{ inputs.gist_filename }}" >> "$GITHUB_ENV"
          echo "LOCAL_INPUT=$RUNNER_TEMP/${{ inputs.gist_filename }}" >> "$GITHUB_ENV"
          echo "LOCAL_OUTPUT=$RUNNER_TEMP/${{ inputs.gist_filename }}.new" >> "$GITHUB_ENV"

      - name: Download existing data from Gist
        if: ${{ inputs.mode != 'full-rebuild' }}
        shell: bash
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          gist_id = os.environ["GIST_ID"]
          file_name = os.environ["GIST_FILENAME"]
          local_input = os.environ["LOCAL_INPUT"]
          token = os.environ["GIST_TOKEN"]

          req = urllib.request.Request(
              f"https://api.github.com/gists/{gist_id}",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          content = ""
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))
              file_info = payload.get("files", {}).get(file_name)
              if file_info:
                  content = file_info.get("content", "")
          except Exception as ex:
              print(f"读取 Gist 失败，按首次运行处理: {ex}")

          with open(local_input, "w", encoding="utf-8", newline="") as f:
              f.write(content)

          print(f"已写入本地输入文件: {local_input}, 字符数={len(content)}")
          PY

      - name: Prepare empty input for full rebuild
        if: ${{ inputs.mode == 'full-rebuild' }}
        shell: bash
        run: |
          : > "$LOCAL_INPUT"

      - name: Run crawler
        id: run_crawler
        shell: bash
        run: |
          CMD=(python -u scripts/mcmod_crawler.py
            --input "$LOCAL_INPUT"
            --output "$LOCAL_OUTPUT"
            --start-id "1")

          if [ "$CRAWLER_MODE" = "append" ]; then
            CMD+=(--max-items "$CRAWLER_MAX_ITEMS")
          fi

          if [ "$CRAWLER_MODE" = "patch" ]; then
            CMD+=(--patch-mode)
            CMD+=(--patch-start "$CRAWLER_PATCH_START")
            CMD+=(--patch-count "$CRAWLER_PATCH_COUNT")
          fi

          if [ "$CRAWLER_MODE" = "full-rebuild" ]; then
            CMD+=(--full-rebuild)
          fi

          "${CMD[@]}"

      - name: Upload result as workflow artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: mcmod-data-output
          path: ${{ env.LOCAL_OUTPUT }}

      - name: Update gist file
        if: ${{ !inputs.dry_run && steps.run_crawler.outcome == 'success' }}
        shell: bash
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          gist_id = os.environ["GIST_ID"]
          file_name = os.environ["GIST_FILENAME"]
          local_output = os.environ["LOCAL_OUTPUT"]
          token = os.environ["GIST_TOKEN"]

          with open(local_output, "r", encoding="utf-8", errors="ignore") as f:
              content = f.read()

          payload = {
              "files": {
                  file_name: {
                      "content": content,
                  }
              }
          }

          req = urllib.request.Request(
              f"https://api.github.com/gists/{gist_id}",
              method="PATCH",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
          )

          with urllib.request.urlopen(req, timeout=60) as resp:
              _ = resp.read().decode("utf-8")

          print(f"Gist 更新完成: {gist_id} / {file_name} / chars={len(content)}")
          PY

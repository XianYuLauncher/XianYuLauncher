name: Validation

on:
  push:
    branches:
      - main
      - "ci/**"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:
  workflow_call:
    inputs:
      upload_artifacts:
        description: Upload TRX and build log artifacts when reused by another workflow
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  Velopack_Cli_Version: 0.0.1298
  Velopack_Runtime_Version: 9.0.x

jobs:
  core-tests:
    name: Core Tests
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test XianYuLauncher.Tests
        shell: pwsh
        run: |
          dotnet test XianYuLauncher.Tests/XianYuLauncher.Tests.csproj `
            --logger "trx;LogFileName=XianYuLauncher.Tests.trx" `
            --results-directory "$env:GITHUB_WORKSPACE\TestResults\XianYuLauncher.Tests"

      - name: Test XianYuLauncher.IntegrationTests
        shell: pwsh
        run: |
          dotnet test XianYuLauncher.IntegrationTests/XianYuLauncher.IntegrationTests.csproj `
            --logger "trx;LogFileName=XianYuLauncher.IntegrationTests.trx" `
            --results-directory "$env:GITHUB_WORKSPACE\TestResults\XianYuLauncher.IntegrationTests"

      - name: Upload test results
        if: ${{ !cancelled() && github.event_name != 'workflow_call' }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-test-results
          path: TestResults/**/*.trx
          if-no-files-found: error

      - name: Upload test results (workflow_call)
        if: ${{ !cancelled() && github.event_name == 'workflow_call' && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-test-results
          path: TestResults/**/*.trx
          if-no-files-found: error

  winui-build-smoke:
    name: WinUI Build Smoke
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: pwsh
        run: |
          nuget restore XianYuLauncher.slnx -ConfigFile NuGet.config

      - name: Build WinUI app
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          msbuild XianYuLauncher/XianYuLauncher.csproj `
            -p:Configuration=Debug `
            -p:Platform=x64 `
            -bl:"$artifactDir\verify-app.binlog"

      - name: Upload build log
        if: ${{ !cancelled() && github.event_name != 'workflow_call' }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-build-log
          path: artifacts/verify-app.binlog
          if-no-files-found: error

      - name: Upload build log (workflow_call)
        if: ${{ !cancelled() && github.event_name == 'workflow_call' && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-build-log
          path: artifacts/verify-app.binlog
          if-no-files-found: error

  unpackaged-publish-smoke:
    name: Unpackaged Publish Smoke
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install .NET 9 Runtime For Velopack CLI
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.Velopack_Runtime_Version }}

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          $toolPath = Join-Path $env:GITHUB_WORKSPACE 'Tools\vpk'
          if (Test-Path $toolPath) {
              Remove-Item -Path $toolPath -Recurse -Force
          }

          dotnet tool install vpk --version ${{ env.Velopack_Cli_Version }} --tool-path $toolPath
          "VPK_EXE=$(Join-Path $toolPath 'vpk.exe')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure Channel
        id: sideload_channel
        shell: pwsh
        run: |
          .\scripts\ci\configure-build-channel.ps1 `
            -RefName "v0.0.1" `
            -UpdaterRuntimeIdentifier "win-x64"

      - name: Restore
        shell: pwsh
        run: |
          nuget restore XianYuLauncher.slnx -ConfigFile NuGet.config

      - name: Publish Unpackaged
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          $publishDir = Join-Path $artifactDir "unpackaged-publish"

          if (Test-Path $publishDir) {
              Remove-Item -Path $publishDir -Recurse -Force
          }

            New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
            New-Item -ItemType Directory -Force -Path $publishDir | Out-Null

          msbuild XianYuLauncher/XianYuLauncher.csproj `
            -t:Publish `
            -restore `
            -p:PublishProfile=Release-Unpackaged `
            -p:Platform=x64 `
            -p:RuntimeIdentifier=win-x64 `
            -p:BuildChannelConstant=${{ steps.sideload_channel.outputs.build_constants }} `
            -p:PublishDir="$publishDir\\" `
            -bl:"$artifactDir\verify-unpackaged.binlog"

          $requiredOutputs = @(
              'XianYuLauncher.exe',
              'resources.pri',
              'Assets\WindowIcon.ico',
              'Assets\Icons\Contributors\SpiritStudio.png',
              'Assets\Libs\skinview3d.bundle.js'
          )

          foreach ($relativePath in $requiredOutputs) {
              $fullPath = Join-Path $publishDir $relativePath
              if (-not (Test-Path $fullPath)) {
                  Write-Error "Missing unpackaged publish output: $relativePath"
                  exit 1
              }
          }

      - name: Pack Velopack Smoke
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts'
          $publishDir = Join-Path $artifactDir 'unpackaged-publish'
          $releaseDir = Join-Path $artifactDir 'velopack-release'

          if (Test-Path $releaseDir) {
              Remove-Item -Path $releaseDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          .\scripts\ci\pack-velopack.ps1 `
            -PublishDirectory $publishDir `
            -ReleaseDirectory $releaseDir `
            -PackVersion "${{ steps.sideload_channel.outputs.updater_version }}" `
            -Channel "${{ steps.sideload_channel.outputs.updater_channel }}" `
            -RuntimeIdentifier 'win-x64' `
            -VpkExecutablePath "$env:VPK_EXE"

      - name: Upload unpackaged publish log
        if: ${{ !cancelled() && github.event_name != 'workflow_call' }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-unpackaged-build-log
          path: artifacts/verify-unpackaged.binlog
          if-no-files-found: error

      - name: Upload unpackaged publish log (workflow_call)
        if: ${{ !cancelled() && github.event_name == 'workflow_call' && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: validation-unpackaged-build-log
          path: artifacts/verify-unpackaged.binlog
          if-no-files-found: error